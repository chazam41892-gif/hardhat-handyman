# Cloudflare Pages Configuration for Hardhat Handyman

name = "hardhat-handyman"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

[vars]
ENVIRONMENT = "production"

# Environment variables are set in the Cloudflare Dashboard:
# LEVIATHAN_API_KEY - for AI lead processing
# TWILIO_ACCOUNT_SID - for SMS notifications
# TWILIO_AUTH_TOKEN - for SMS notifications
# SENDGRID_API_KEY - for email notifications
# OWNER_PHONE - Rocky's phone number for urgent leads
# OWNER_EMAIL - Rocky's email address
